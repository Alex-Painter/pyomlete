services:
  # FastAPI backend
  - type: web
    name: omlete-api
    runtime: python
    region: oregon
    rootDir: server
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false

  # TanStack Start (Nitro SSR) frontend
  - type: web
    name: pyomlete-client
    runtime: node
    region: oregon
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: VITE_API_URL
        value: https://omlete-api.onrender.com

previewsEnabled: true
previewsExpireAfterDays: 3
