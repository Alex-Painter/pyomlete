services:
  # FastAPI backend
  - type: web
    name: omlete-api
    runtime: python
    rootDir: server
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false

  # TanStack Start (Nitro SSR) frontend
  - type: web
    name: omlete-client
    runtime: node
    rootDir: client
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node server.mjs
    envVars:
      # Set to the deployed backend URL, e.g. https://omlete-api.onrender.com
      # See setup notes below for wiring /api proxy in Nitro
      - key: VITE_API_URL
        fromService:
          name: omlete-api
          type: web
          property: host
